<svg viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <linearGradient id="crustGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C949"/>
      <stop offset="50%" stop-color="#E0B530"/>
      <stop offset="100%" stop-color="#D4A520"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#E0B530"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1a1a1a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .character-group {
      animation: coolSway 4s ease-in-out infinite;
      transform-origin: 250px 650px;
    }
    @keyframes coolSway {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      50% { transform: rotate(0.5deg) translateY(-4px); }
    }
    .glint {
      animation: glint 5s ease-in-out infinite;
    }
    .glint-2 {
      animation: glint 5s ease-in-out infinite;
      animation-delay: 2.5s;
    }
    @keyframes glint {
      0%, 80%, 100% { opacity: 0; }
      85% { opacity: 0.8; }
    }
    .crust-ring {
      animation: crustBounce 4s ease-in-out infinite;
      transform-origin: 250px 280px;
    }
    @keyframes crustBounce {
      0%, 100% { transform: scaleY(1) translateY(0); }
      50% { transform: scaleY(1.02) translateY(1px); }
    }
    .waving-hand {
      animation: wave 2.5s ease-in-out infinite;
      transform-origin: 330px 340px;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(12deg); }
      30% { transform: rotate(-5deg); }
      45% { transform: rotate(10deg); }
      60% { transform: rotate(0deg); }
    }
    .left-arm {
      animation: armIdle 4s ease-in-out infinite;
      transform-origin: 210px 320px;
    }
    @keyframes armIdle {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-1.5deg); }
    }
    .crown {
      animation: crownWiggle 3s ease-in-out infinite;
      transform-origin: 250px 130px;
    }
    @keyframes crownWiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      75% { transform: rotate(-2deg); }
    }
    .legs {
      animation: legShift 4s ease-in-out infinite;
      transform-origin: 250px 500px;
    }
    @keyframes legShift {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(0.3deg); }
    }
    .reflection-line {
      animation: shimmer 3s ease-in-out infinite;
    }
    .reflection-line-2 {
      animation: shimmer 3s ease-in-out infinite;
      animation-delay: 0.15s;
    }
    .reflection-line-3 {
      animation: shimmer 3s ease-in-out infinite;
      animation-delay: 0.3s;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.4; }
    }
  </style>

  <g class="character-group">

    <!-- Legs -->
    <g class="legs">
      <path d="M235 500 L200 600 L185 620 Q178 635 188 645 L210 660 Q220 665 225 655 L230 640 L260 520"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M188 645 L170 650 Q162 655 168 662 L210 660"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M260 500 L290 580 L310 630 Q315 645 305 655 L280 660 Q268 662 265 652 L262 640 L245 520"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M305 655 L330 650 Q340 652 338 660 L320 665 L280 660"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
    </g>

    <!-- Torso -->
    <path d="M220 300 Q220 500 235 510 L265 510 Q280 500 280 300 Z"
          fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- Left arm -->
    <g class="left-arm">
      <path d="M220 320 Q195 340 190 360 Q185 380 195 395 Q205 405 215 395 Q225 385 228 370 L230 340"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M195 388 Q188 395 192 402 Q198 408 205 400"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Right arm (waving) -->
    <g class="waving-hand">
      <path d="M280 320 Q310 310 340 320 Q360 330 365 345"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M340 320 Q355 325 362 340"
            fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
      <ellipse cx="365" cy="348" rx="12" ry="14" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3"/>
      <path d="M360 336 Q355 318 358 310" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M366 334 Q366 314 368 305" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M372 336 Q376 318 378 312" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M376 342 Q384 330 386 324" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M354 348 Q342 345 338 338" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
    </g>

    <!-- Crust ring -->
    <g class="crust-ring">
      <ellipse cx="250" cy="280" rx="85" ry="28" fill="url(#crustGrad)" stroke="#1a1a1a" stroke-width="3.5"/>
      <path d="M180 280 Q215 290 250 286 Q285 290 320 280"
            fill="none" stroke="#C49A18" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="230" cy="270" rx="30" ry="6" fill="white" opacity="0.12"/>
      <path d="M170 288 Q210 305 250 300 Q290 305 330 288"
            fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </g>

    <!-- Head (pizza slice) -->
    <path d="M250 120 L185 260 Q185 270 195 270 L305 270 Q315 270 315 260 L250 120 Z"
          fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- Topping spots -->
    <circle cx="230" cy="230" r="4" fill="#F5E6C8" stroke="#E0D0B0" stroke-width="1" opacity="0.5"/>
    <circle cx="265" cy="245" r="3" fill="#F5E6C8" stroke="#E0D0B0" stroke-width="1" opacity="0.4"/>
    <circle cx="245" cy="250" r="3.5" fill="#F5E6C8" stroke="#E0D0B0" stroke-width="1" opacity="0.45"/>

    <!-- Sunglasses -->
    <g filter="url(#softShadow)">
      <ellipse cx="232" cy="210" rx="24" ry="20" fill="url(#lensGrad)" stroke="#1a1a1a" stroke-width="4.5"/>
      <ellipse cx="268" cy="210" rx="24" ry="20" fill="url(#lensGrad)" stroke="#1a1a1a" stroke-width="4.5"/>
      <path d="M256 208 Q250 202 244 208" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <path d="M208 206 Q195 202 185 206" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M292 206 Q305 202 315 206" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
      <line class="reflection-line" x1="220" y1="204" x2="240" y2="204" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line class="reflection-line-2" x1="218" y1="210" x2="242" y2="210" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line class="reflection-line-3" x1="222" y1="216" x2="238" y2="216" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line class="reflection-line" x1="256" y1="204" x2="276" y2="204" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line class="reflection-line-2" x1="254" y1="210" x2="278" y2="210" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line class="reflection-line-3" x1="258" y1="216" x2="274" y2="216" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>

    <!-- Glasses glints -->
    <circle class="glint" cx="222" cy="200" r="5" fill="white" opacity="0"/>
    <circle class="glint-2" cx="272" cy="202" r="4" fill="white" opacity="0"/>

    <!-- Crown -->
    <g class="crown">
      <path d="M240 130 Q238 115 242 105 Q246 95 250 88 Q254 95 258 105 Q262 115 260 130"
            fill="url(#crownGrad)" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
      <path d="M242 118 Q235 108 232 100 Q236 95 240 102 L242 112"
            fill="url(#crownGrad)" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M258 118 Q265 108 268 100 Q264 95 260 102 L258 112"
            fill="url(#crownGrad)" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Eyebrows -->
    <path d="M215 192 Q232 186 248 192" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M252 192 Q268 186 285 192" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  </g>
</svg>
